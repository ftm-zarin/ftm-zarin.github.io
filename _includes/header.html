{% if site.background %}
<style>
body {
  background: url('{{ site.background | relative_url }}') no-repeat center center fixed;
  background-size: cover;
}
</style>
{% endif %}

{% if site.avatar %}
<img class="avatar" src="{{ site.avatar | relative_url }}" alt="{{ site.title }}">
{% endif %}

<div class="title-card">
  <h1>{{ site.title }}</h1>
  <h3>{{ site.description }}</h3>
</div>
